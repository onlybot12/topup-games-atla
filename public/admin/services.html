<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin - Profit % Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .table-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .img-icon { width: 35px; height: 35px; object-fit: contain; margin-right: 10px; }
        .profit-box { background: #f8f9fa; padding: 20px; border-radius: 12px; border: 1px solid #dee2e6; margin-bottom: 25px; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="fas fa-percentage text-primary"></i> Kelola Profit & Layanan</h3>
        <a href="/" class="btn btn-sm btn-outline-secondary">Kembali ke Toko</a>
    </div>

    <!-- PENGATURAN PROFIT PERSEN -->
    <div class="profit-box shadow-sm">
        <div class="row align-items-center">
            <div class="col-md-5">
                <label class="form-label fw-bold">Set Profit Global (%)</label>
                <div class="input-group">
                    <input type="number" id="profitInput" class="form-control" placeholder="Contoh: 5" value="5">
                    <span class="input-group-text">%</span>
                    <button class="btn btn-success" id="btnSync" onclick="sync()">
                        <i class="fas fa-sync"></i> GET LIST & TERAPKAN %
                    </button>
                </div>
            </div>
            <div class="col-md-7 text-end">
                <p class="mb-0 text-muted small">Update Terakhir: <span id="lastUpdate">-</span></p>
                <p class="mb-0 text-muted x-small">*Harga jual akan dibulatkan ke ratusan terdekat.</p>
            </div>
        </div>
    </div>

    <div class="table-container">
        <input type="text" id="src" class="form-control mb-3" placeholder="Cari nama produk atau provider..." onkeyup="search()">
        
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Layanan</th>
                        <th>Kategori</th>
                        <th>Modal</th>
                        <th>Harga Jual</th>
                        <th>Status API</th>
                        <th>Aktif</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    async function load() {
        const res = await fetch('/api/admin/services');
        const json = await res.json();
        const list = document.getElementById('list');
        if(json.data.length > 0) document.getElementById('lastUpdate').innerText = new Date(json.data[0].updated_at).toLocaleString();
        
        list.innerHTML = json.data.map(item => `
            <tr>
                <td>
                    <div class="d-flex align-items-center">
                        <img src="${item.img_url}" class="img-icon">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small class="text-muted">${item.brand} | ${item.service_id}</small>
                        </div>
                    </div>
                </td>
                <td><span class="badge bg-secondary">${item.category}</span></td>
                <td class="text-muted small">Rp ${item.price_original.toLocaleString()}</td>
                <td>
                    <input type="number" id="p-${item._id}" class="form-control form-control-sm border-primary" value="${item.price_sell}" style="width: 110px">
                </td>
                <td>
                    <span class="badge ${item.status_api === 'available' ? 'bg-success' : 'bg-danger'}">${item.status_api}</span>
                </td>
                <td>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="s-${item._id}" ${item.is_active ? 'checked' : ''}>
                    </div>
                </td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="save('${item._id}')"><i class="fas fa-save"></i></button>
                </td>
            </tr>
        `).join('');
    }

    async function sync() {
        const profit = document.getElementById('profitInput').value;
        const btn = document.getElementById('btnSync');
        btn.disabled = true; btn.innerText = 'Syncing...';
        
        const res = await fetch('/api/admin/sync-services', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ profit })
        });
        const data = await res.json();
        if(data.status) {
            Swal.fire('Berhasil', data.message, 'success');
            load();
        }
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-sync"></i> GET LIST & TERAPKAN %';
    }

    async function save(id) {
        const price_sell = document.getElementById(`p-${id}`).value;
        const is_active = document.getElementById(`s-${id}`).checked;
        await fetch(`/api/admin/services/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ price_sell, is_active })
        });
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Tersimpan', showConfirmButton: false, timer: 1000 });
    }

    function search() {
        let val = document.getElementById('src').value.toLowerCase();
        let rows = document.querySelectorAll('#list tr');
        rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
    }
    load();
</script>
</body>
</html>
