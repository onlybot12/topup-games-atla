<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Lana Store</title>
    
    <!-- CSS Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* SIDEBAR ANIMATION */
        #sidebar {
            transition: all 0.3s ease-in-out;
            width: 260px;
            position: fixed;
            left: -260px;
            top: 0;
            bottom: 0;
            z-index: 1000;
        }

        #sidebar.active { left: 0; }

        #main-content {
            transition: all 0.3s ease-in-out;
            width: 100%;
            margin-left: 0;
        }

        #sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            backdrop-filter: blur(2px);
        }

        #sidebar-overlay.active { display: block; }

        /* Table Style */
        .table { background: white; border-radius: 12px; overflow: hidden; border: none !important; }
        .img-icon { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; }
        .dataTables_filter input { border: 1px solid #e2e8f0; border-radius: 8px; padding: 4px 10px; font-size: 12px; }
        .dataTables_length select { border: 1px solid #e2e8f0; border-radius: 8px; padding: 2px 5px; font-size: 12px; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- OVERLAY -->
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="bg-slate-900 text-slate-400 shadow-2xl flex flex-col">
        <div class="p-6 border-b border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xs">
                    <i class="fas fa-user-shield"></i>
                </div>
                <span class="text-white font-bold tracking-tight text-base">LANA ADMIN</span>
            </div>
            <button onclick="toggleSidebar()" class="lg:hidden text-slate-500"><i class="fas fa-times"></i></button>
        </div>

        <nav class="flex-1 p-4 space-y-1">
            <a href="/" class="flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all text-sm">
                <i class="fas fa-home"></i> <span>Website</span>
            </a>
            <div class="pt-4 pb-1 px-4 text-[10px] font-bold text-slate-600 uppercase tracking-widest">Menu</div>
            <a href="/admin/services" class="flex items-center gap-3 px-4 py-2.5 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-500/20 text-sm">
                <i class="fas fa-box"></i> <span>Kelola Layanan</span>
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all text-sm">
                <i class="fas fa-receipt"></i> <span>Transaksi</span>
            </a>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button onclick="deleteDb()" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-red-400 hover:bg-red-500/10 transition-all text-xs">
                <i class="fas fa-trash-alt"></i> <span>Hapus Database</span>
            </button>
        </div>
    </aside>

    <!-- MAIN WORKSPACE -->
    <div id="main-content">
        
        <!-- NAVBAR -->
        <header class="h-16 bg-white border-b border-slate-200 sticky top-0 z-50 px-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-all">
                    <i class="fas fa-bars-staggered"></i>
                </button>
                <h1 class="font-bold text-slate-800 text-sm">Dashboard</h1>
            </div>

            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] font-black text-slate-900 uppercase">Administrator</p>
                </div>
                <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xs">A</div>
            </div>
        </header>

        <!-- CONTENT -->
        <main class="p-4 md:p-6 max-w-full">
            
            <!-- TOOLBAR (Small, Left Aligned) -->
            <div class="flex flex-wrap items-center gap-3 mb-6">
                <!-- Profit Input -->
                <div class="flex items-center bg-white border border-slate-200 px-3 py-1.5 rounded-xl shadow-sm">
                    <span class="text-[10px] font-bold text-slate-400 uppercase mr-2">Profit:</span>
                    <input type="number" id="profitInput" value="5" class="w-8 font-bold text-blue-600 focus:outline-none bg-transparent text-xs">
                    <span class="text-[10px] font-bold text-slate-400">%</span>
                </div>

                <!-- Small Sync Button -->
                <button id="btnSync" onclick="syncData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-xl font-bold text-[10px] shadow-md shadow-blue-500/20 flex items-center gap-2 transition-all uppercase tracking-wider">
                    <i class="fas fa-sync"></i> SYNCR ATL
                </button>

                <!-- Last Update Badge -->
                <div id="lastUpdate" class="px-3 py-1.5 bg-slate-100 text-slate-500 rounded-xl text-[9px] font-bold uppercase tracking-tight">
                    Update: -
                </div>
            </div>

            <!-- TABLE CARD -->
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden p-4 md:p-5">
                <div class="table-responsive">
                    <table id="tableServices" class="table table-hover w-100 align-middle">
                        <thead class="text-[9px] font-black uppercase tracking-widest text-slate-400 border-b border-slate-100">
                            <tr>
                                <th>CODE</th>
                                <th>LAYANAN</th>
                                <th>KATEGORI</th>
                                <th>MODAL</th>
                                <th>JUAL</th>
                                <th>STATUS</th>
                                <th>AKTIF</th>
                                <th>SAVE</th>
                            </tr>
                        </thead>
                        <tbody class="text-xs font-medium text-slate-600"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // TOGGLE SIDEBAR
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const main = document.getElementById('main-content');
            
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            
            if(window.innerWidth > 1024) {
                if(sidebar.classList.contains('active')) {
                    main.style.marginLeft = "260px";
                    main.style.width = "calc(100% - 260px)";
                } else {
                    main.style.marginLeft = "0";
                    main.style.width = "100%";
                }
            }
        }

        // DATATABLES
        $(document).ready(function() {
            const table = $('#tableServices').DataTable({
                "processing": true,
                "serverSide": true,
                "ajax": { "url": "/api/admin/services", "type": "GET" },
                "pageLength": 10,
                "lengthMenu": [[10, 20, 50, 100], [10, 20, 50, 100]],
                "columns": [
                    { "data": "service_id" },
                    { 
                        "data": null,
                        "render": d => `<div class="flex items-center gap-2"><img src="${d.img_url}" class="img-icon"><span class="font-bold text-slate-700">${d.name}</span></div>`
                    },
                    { "data": "category" },
                    { "data": "price_original", "render": d => `<span class="text-slate-400">Rp ${parseInt(d).toLocaleString()}</span>` },
                    { 
                        "data": null,
                        "render": d => `<input type="number" id="p-${d._id}" class="w-20 bg-slate-50 border border-slate-200 rounded-md px-2 py-0.5 font-bold text-blue-600 text-xs" value="${d.price_sell}">`
                    },
                    { 
                        "data": "status_api",
                        "render": d => {
                            let color = d === 'available' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600';
                            return `<span class="px-2 py-0.5 rounded text-[9px] font-black uppercase ${color}">${d}</span>`;
                        }
                    },
                    {
                        "data": null,
                        "render": d => `<div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="s-${d._id}" ${d.is_active?'checked':''} onchange="updateRow('${d._id}')"></div>`
                    },
                    {
                        "data": null,
                        "render": d => `<button class="btn btn-sm btn-primary py-0 px-2 rounded" onclick="updateRow('${d._id}')"><i class="fas fa-save text-[10px]"></i></button>`
                    }
                ],
                "language": {
                    "search": "",
                    "searchPlaceholder": "Cari produk...",
                    "processing": "Loading..."
                },
                "drawCallback": function(settings) {
                    const data = settings.json.data;
                    if(data && data.length > 0) $('#lastUpdate').text("Update: " + new Date(data[0].updated_at).toLocaleString());
                }
            });
        });

        async function syncData() {
            const profit = $('#profitInput').val();
            const btn = $('#btnSync');
            btn.attr('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> SYNC...');
            
            try {
                const res = await fetch('/api/admin/sync-services', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ profit })
                });
                const data = await res.json();
                if(data.status) {
                    Swal.fire({ icon: 'success', title: 'Berhasil', text: data.message, timer: 1500, showConfirmButton: false });
                    $('#tableServices').DataTable().ajax.reload();
                }
            } catch (e) { Swal.fire('Error', 'Koneksi gagal', 'error'); }
            finally { btn.attr('disabled', false).html('<i class="fas fa-sync"></i> SYNCR ATL'); }
        }

        async function updateRow(id) {
            const price_sell = $(`#p-${id}`).val();
            const is_active = $(`#s-${id}`).is(':checked');
            await fetch(`/api/admin/services/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ price_sell, is_active })
            });
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1000 });
            Toast.fire({ icon: 'success', title: 'Saved' });
        }

        async function deleteDb() {
            const confirm = await Swal.fire({ title: 'Hapus DB?', text: "Semua data akan hilang!", icon: 'warning', showCancelButton: true });
            if(confirm.isConfirmed) {
                await fetch('/api/admin/delete-services', { method: 'DELETE' });
                $('#tableServices').DataTable().ajax.reload();
                Swal.fire('Dihapus!', 'Database kosong.', 'success');
            }
        }
    </script>
</body>
</html>
