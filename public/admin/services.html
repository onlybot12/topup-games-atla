<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Management Layanan - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f4f6f9; font-size: 13px; }
        .card-main { border: none; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.05); background: #fff; padding: 20px; }
        .img-icon { width: 25px; height: 25px; object-fit: contain; margin-right: 8px; }
        .header-box { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #007bff; }
    </style>
</head>
<body class="p-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold"><i class="fas fa-database me-2"></i> Kelola Layanan</h4>
        
        <div class="header-box shadow-sm d-flex gap-2 align-items-center">
            <div class="input-group input-group-sm">
                <span class="input-group-text fw-bold">Profit</span>
                <input type="number" id="profitInput" class="form-control text-center" value="5" style="width: 60px;">
                <span class="input-group-text">%</span>
                <button class="btn btn-primary" onclick="syncData()" id="btnSync"><i class="fas fa-sync"></i> SYNC</button>
            </div>
            <button class="btn btn-danger btn-sm" onclick="deleteDb()" id="btnDel"><i class="fas fa-trash"></i> HAPUS DB</button>
        </div>
    </div>

    <div class="card-main">
        <table id="tableServices" class="table table-bordered table-hover w-100">
            <thead class="table-light text-uppercase" style="font-size: 11px;">
                <tr>
                    <th>CODE</th>
                    <th>LAYANAN</th>
                    <th>KATEGORI</th>
                    <th>PROVIDER</th>
                    <th>MODAL</th>
                    <th>JUAL</th>
                    <th>STATUS</th>
                    <th>AKTIF</th>
                    <th>AKSI</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
$(document).ready(function() {
    const table = $('#tableServices').DataTable({
        "processing": true,
        "serverSide": true,
        "ajax": { "url": "/api/admin/services", "type": "GET" },
        "pageLength": 10,
        "lengthMenu": [ [10, 20, 30, 50, -1], [10, 20, 30, 50, "All"] ],
        "columns": [
            { "data": "service_id" },
            { 
                "data": null,
                "render": function(data) {
                    return `<img src="${data.img_url}" class="img-icon"><span>${data.name}</span>`;
                }
            },
            { "data": "category" },
            { "data": "brand" },
            { "data": "price_original", "render": d => 'Rp '+d.toLocaleString() },
            {
                "data": null,
                "render": d => `<input type="number" id="p-${d._id}" class="form-control form-control-sm" value="${d.price_sell}" style="width:90px">`
            },
            { 
                "data": "status_api",
                "render": d => `<span class="badge bg-${d==='available'?'success':'danger'}">${d}</span>`
            },
            {
                "data": null,
                "render": d => `<div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="s-${d._id}" ${d.is_active?'checked':''} onchange="updateRow('${d._id}')"></div>`
            },
            {
                "data": null,
                "render": d => `<button class="btn btn-sm btn-primary" onclick="updateRow('${d._id}')"><i class="fas fa-save"></i></button>`
            }
        ]
    });
});

async function syncData() {
    const profit = $('#profitInput').val();
    $('#btnSync').attr('disabled', true).text('Syncing...');
    const res = await fetch('/api/admin/sync-services', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ profit })
    });
    const data = await res.json();
    Swal.fire(data.status?'Berhasil':'Gagal', data.message, data.status?'success':'error');
    $('#tableServices').DataTable().ajax.reload();
    $('#btnSync').attr('disabled', false).html('<i class="fas fa-sync"></i> SYNC');
}

async function deleteDb() {
    const ask = await Swal.fire({ title: 'Hapus Database?', text: "Data akan kosong!", icon: 'warning', showCancelButton: true });
    if(ask.isConfirmed) {
        await fetch('/api/admin/delete-services', { method: 'DELETE' });
        Swal.fire('Dihapus!', 'Database kosong.', 'success');
        $('#tableServices').DataTable().ajax.reload();
    }
}

async function updateRow(id) {
    const price_sell = $(`#p-${id}`).val();
    const is_active = $(`#s-${id}`).is(':checked');
    await fetch(`/api/admin/services/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ price_sell, is_active })
    });
    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1000 });
    Toast.fire({ icon: 'success', title: 'Saved' });
}
</script>
</body>
</html>
