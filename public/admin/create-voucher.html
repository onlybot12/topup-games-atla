<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lana Admin - Voucher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 1023px) {
            #sidebar { transform: translateX(-100%); width: 280px; position: fixed; height: 100%; z-index: 1000; }
            #sidebar.active { transform: translateX(0); }
        }
        
        .voucher-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[999] hidden opacity-0" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-slate-400 flex flex-col z-[1000] lg:translate-x-0">
        <div class="p-6 border-b border-slate-800 flex items-center justify-between text-white font-black text-xl">
            <span>LANA ADMIN</span>
            <button onclick="toggleSidebar()" class="lg:hidden text-slate-500"><i class="fas fa-times"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/admin/layanan" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all font-semibold">
                <i class="fas fa-box"></i> <span>Kelola Layanan</span>
            </a>
            <a href="/admin/voucher" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-500/20 font-bold">
                <i class="fas fa-ticket-alt"></i> <span>Buat Voucher</span>
            </a>
            <a href="/admin/pengaturan" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all font-semibold">
                <i class="fas fa-cog"></i> <span>Pengaturan QRIS</span>
            </a>
        </nav>
    </aside>

    <div id="main-content" class="lg:ml-64">
        <header class="h-16 bg-white border-b px-4 flex items-center justify-between sticky top-0 z-40">
            <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 bg-slate-50 border rounded-xl flex items-center justify-center text-slate-600">
                <i class="fas fa-bars-staggered"></i>
            </button>
            <h1 class="font-bold text-slate-800 text-sm">Promo Voucher</h1>
            <button onclick="openVoucherModal()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">
                <i class="fas fa-plus mr-1"></i> Baru
            </button>
        </header>

        <main class="p-4 md:p-6">
            <div id="voucher-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Data vouchers load here -->
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function toggleSidebar() {
            $('#sidebar').toggleClass('active');
            $('#sidebar-overlay').toggleClass('hidden').toggleClass('opacity-100');
        }

        async function loadVouchers() {
            const res = await fetch('/api/admin/vouchers');
            const json = await res.json();
            const grid = $('#voucher-grid').empty();
            if(json.data.length === 0) return grid.html('<p class="text-center text-slate-400 py-20 col-span-full">Belum ada voucher aktif.</p>');
            
            json.data.forEach(v => {
                const percent = (v.used_count / v.quota) * 100;
                grid.append(`
                    <div class="voucher-card">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-1">${v.type === 'percentage' ? 'Potongan %' : 'Potongan Tunai'}</p>
                                <h3 class="text-xl font-black text-slate-800">${v.code}</h3>
                            </div>
                            <button onclick="deleteVoucher('${v._id}')" class="w-8 h-8 bg-red-50 text-red-500 rounded-lg"><i class="fas fa-trash-alt text-xs"></i></button>
                        </div>
                        <p class="text-2xl font-black text-slate-900 mb-6">${v.type === 'percentage' ? v.value + '%' : 'Rp ' + v.value.toLocaleString()}</p>
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <div class="flex justify-between text-[10px] font-black mb-2">
                                <span class="text-slate-400">PENGGUNAAN</span>
                                <span class="text-slate-800">${v.used_count}/${v.quota}</span>
                            </div>
                            <div class="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-500 rounded-full" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>
                `);
            });
        }
        loadVouchers();

        async function openVoucherModal() {
            const { value: v } = await Swal.fire({
                title: 'Buat Voucher Baru',
                confirmButtonColor: '#2563eb',
                html: `
                    <div class="text-left">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Kode</label>
                        <input id="v-code" class="swal2-input !mt-1 !text-sm" placeholder="DISKON10">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Tipe</label>
                        <select id="v-type" class="swal2-input !mt-1 !text-sm"><option value="fixed">Rp</option><option value="percentage">%</option></select>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Nilai</label>
                        <input id="v-val" type="number" class="swal2-input !mt-1 !text-sm">
                        <div class="grid grid-cols-2 gap-3 mt-2">
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Min. Belanja</label><input id="v-min" type="number" class="swal2-input !mt-1 !text-sm" value="0"></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Kuota</label><input id="v-quota" type="number" class="swal2-input !mt-1 !text-sm" value="10"></div>
                        </div>
                    </div>
                `,
                preConfirm: () => ({ code: $('#v-code').val().toUpperCase(), type: $('#v-type').val(), value: $('#v-val').val(), min_order: $('#v-min').val(), quota: $('#v-quota').val() })
            });
            if(v) {
                await fetch('/api/admin/vouchers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(v) });
                loadVouchers();
            }
        }

        async function deleteVoucher(id) {
            const confirm = await Swal.fire({ title: 'Hapus Voucher?', text: "Tindakan ini tidak bisa dibatalkan.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444' });
            if(confirm.isConfirmed) { await fetch(`/api/admin/vouchers/${id}`, { method: 'DELETE' }); loadVouchers(); }
        }
    </script>
</body>
</html>
