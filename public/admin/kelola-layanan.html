<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Lana Admin - Kelola Layanan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        #sidebar { transition: all 0.3s; width: 260px; position: fixed; left: -260px; top: 0; bottom: 0; z-index: 1000; }
        #sidebar.active { left: 0; }
        #main-content { transition: all 0.3s; width: 100%; }
        .table { font-size: 12px; border: none !important; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="bg-slate-900 text-slate-400 flex flex-col shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3 text-white font-black text-xl">
            <i class="fas fa-rocket text-blue-500"></i> LANA ADMIN
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/admin/layanan" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-500/20 font-bold">
                <i class="fas fa-box"></i> <span>Kelola Layanan</span>
            </a>
            <a href="/admin/voucher" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all">
                <i class="fas fa-ticket-alt"></i> <span>Buat Voucher</span>
            </a>
            <a href="/" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 transition-all border-t border-slate-800 mt-4">
                <i class="fas fa-external-link-alt"></i> <span>Lihat Toko</span>
            </a>
        </nav>
    </aside>

    <div id="main-content">
        <header class="h-16 bg-white border-b border-slate-200 sticky top-0 z-50 px-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 border border-slate-200 text-slate-600">
                    <i class="fas fa-bars-staggered"></i>
                </button>
                <h1 class="font-bold text-slate-800">Kelola Layanan</h1>
            </div>
        </header>

        <main class="p-6">
            <div class="flex items-center gap-3 mb-6">
                <div class="flex items-center bg-white border px-3 py-1.5 rounded-xl shadow-sm">
                    <span class="text-[10px] font-bold text-slate-400 uppercase mr-2">Profit Global:</span>
                    <input type="number" id="profitInput" value="5" class="w-8 font-bold text-blue-600 focus:outline-none bg-transparent text-xs text-center">
                    <span class="text-[10px] font-bold text-slate-400">%</span>
                </div>
                <button id="btnSync" onclick="syncData()" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold text-[10px] uppercase shadow-lg shadow-blue-500/20">
                    <i class="fas fa-sync mr-1"></i> SYNCR ATL
                </button>
            </div>

            <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden p-6">
                <table id="tableServices" class="table table-hover w-100 align-middle">
                    <thead class="text-[10px] font-black uppercase text-slate-400">
                        <tr><th>CODE</th><th>LAYANAN</th><th>KATEGORI</th><th>MODAL</th><th>JUAL</th><th>STATUS</th><th>AKTIF</th><th>SAVE</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function toggleSidebar() { $('#sidebar').toggleClass('active'); }
        
        $(document).ready(function() {
            $('#tableServices').DataTable({
                "processing": true, "serverSide": true,
                "ajax": { "url": "/api/admin/services", "type": "GET" },
                "pageLength": 10,
                "columns": [
                    { "data": "service_id" },
                    { "data": null, "render": d => `<div class="flex items-center gap-2"><img src="${d.img_url}" class="w-7 h-7 object-contain"><span class="font-bold text-slate-700">${d.name}</span></div>` },
                    { "data": "category" },
                    { "data": "price_original", "render": d => `<span class="text-slate-400">Rp ${parseInt(d).toLocaleString()}</span>` },
                    { "data": null, "render": d => `<input type="number" id="p-${d._id}" class="w-20 bg-slate-50 border rounded-lg px-2 py-1 font-bold text-blue-600" value="${d.price_sell}">` },
                    { "data": "status_api", "render": d => `<span class="px-2 py-1 rounded text-[9px] font-black uppercase ${d==='available'?'bg-green-100 text-green-600':'bg-red-100 text-red-600'}">${d}</span>` },
                    { "data": null, "render": d => `<div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="s-${d._id}" ${d.is_active?'checked':''} onchange="updateRow('${d._id}')"></div>` },
                    { "data": null, "render": d => `<button class="btn btn-sm btn-primary rounded-lg" onclick="updateRow('${d._id}')"><i class="fas fa-save"></i></button>` }
                ]
            });
        });

        async function syncData() {
            const profit = $('#profitInput').val();
            const btn = $('#btnSync').attr('disabled', true).text('SYNCING...');
            const res = await fetch('/api/admin/sync-services', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ profit }) });
            const data = await res.json();
            Swal.fire(data.status ? 'Berhasil' : 'Gagal', data.message, data.status ? 'success' : 'error');
            $('#tableServices').DataTable().ajax.reload();
            btn.attr('disabled', false).html('<i class="fas fa-sync mr-1"></i> SYNCR ATL');
        }

        async function updateRow(id) {
            const price_sell = $(`#p-${id}`).val();
            const is_active = $(`#s-${id}`).is(':checked');
            await fetch(`/api/admin/services/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ price_sell, is_active }) });
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1000 });
            Toast.fire({ icon: 'success', title: 'Tersimpan' });
        }
    </script>
</body>
</html>
