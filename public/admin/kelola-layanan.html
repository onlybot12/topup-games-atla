<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lana Admin - Kelola Layanan</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* Sidebar Android Style */
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 1023px) {
            #sidebar { transform: translateX(-100%); width: 280px; position: fixed; height: 100%; z-index: 1000; }
            #sidebar.active { transform: translateX(0); }
            #main-content { margin-left: 0 !important; }
        }

        /* Responsive Table Fix */
        .table-container { border-radius: 20px; background: white; padding: 15px; border: 1px solid #e2e8f0; }
        .table-responsive { border: none !important; margin: 0; }
        .table { width: 100% !important; font-size: 14px !important; }
        .table th { border-top: none !important; font-size: 11px !important; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .table td { vertical-align: middle !important; padding: 12px 8px !important; white-space: nowrap; }

        /* Input & UI Adjustments */
        .img-icon { width: 32px; height: 32px; object-fit: contain; border-radius: 8px; }
        .btn-sync { padding: 8px 20px; border-radius: 12px; font-size: 12px; font-weight: 700; }
        .profit-badge { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 6px 12px; }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[999] hidden opacity-0 transition-opacity" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-slate-400 flex flex-col z-[1000] lg:translate-x-0">
        <div class="p-6 border-b border-slate-800 flex items-center justify-between text-white font-black text-xl">
            <span><i class="fas fa-rocket text-blue-500 mr-2"></i>LANA ADMIN</span>
            <button onclick="toggleSidebar()" class="lg:hidden text-slate-500"><i class="fas fa-times"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/admin/layanan" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white shadow-lg shadow-blue-500/20 font-bold">
                <i class="fas fa-box"></i> <span>Kelola Layanan</span>
            </a>
            <a href="/admin/voucher" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all font-semibold">
                <i class="fas fa-ticket-alt"></i> <span>Buat Voucher</span>
            </a>
            <a href="/admin/pengaturan" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all font-semibold">
                <i class="fas fa-cog"></i> <span>Pengaturan QRIS</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div id="main-content" class="lg:ml-64 min-h-screen">
        <header class="h-16 bg-white border-b border-slate-200 sticky top-0 z-40 px-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-slate-50 text-slate-600 border">
                    <i class="fas fa-bars-staggered"></i>
                </button>
                <h1 class="font-bold text-slate-800">Kelola Layanan</h1>
            </div>
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xs">A</div>
        </header>

        <main class="p-4 md:p-6">
            <!-- Toolbar -->
            <div class="flex flex-wrap items-center gap-3 mb-6">
                <div class="profit-badge flex items-center gap-2 shadow-sm">
                    <span class="text-[10px] font-black text-slate-400 uppercase">Profit</span>
                    <input type="number" id="profitInput" value="5" class="w-10 font-bold text-blue-600 focus:outline-none bg-transparent text-center">
                    <span class="text-xs font-bold text-slate-400">%</span>
                </div>
                <button id="btnSync" onclick="syncData()" class="bg-blue-600 text-white btn-sync shadow-md active:scale-95 transition-all uppercase">
                    <i class="fas fa-sync mr-1"></i> SYNCR ATL
                </button>
            </div>

            <!-- Table Card -->
            <div class="table-container shadow-sm overflow-hidden">
                <div class="table-responsive">
                    <table id="tableServices" class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>CODE</th>
                                <th>LAYANAN</th>
                                <th>MODAL</th>
                                <th>JUAL</th>
                                <th>STATUS</th>
                                <th>AKTIF</th>
                                <th>SAVE</th>
                            </tr>
                        </thead>
                        <tbody class="text-slate-600 font-semibold"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        function toggleSidebar() {
            $('#sidebar').toggleClass('active');
            $('#sidebar-overlay').toggleClass('hidden').toggleClass('opacity-100');
        }

        $(document).ready(function() {
            $('#tableServices').DataTable({
                "processing": true, "serverSide": true,
                "ajax": { "url": "/api/admin/services", "type": "GET" },
                "pageLength": 10,
                "language": { "search": "", "searchPlaceholder": "Cari...", "lengthMenu": "_MENU_" },
                "columns": [
                    { "data": "service_id" },
                    { "data": null, "render": d => `
                        <div class="flex items-center gap-3">
                            <img src="${d.img_url}" class="img-icon">
                            <div class="flex flex-col">
                                <span class="text-slate-800 leading-tight">${d.name}</span>
                                <span class="text-[10px] text-slate-400 uppercase">${d.brand}</span>
                            </div>
                        </div>` 
                    },
                    { "data": "price_original", "render": d => `Rp ${parseInt(d).toLocaleString()}` },
                    { "data": null, "render": d => `<input type="number" id="p-${d._id}" class="w-24 bg-slate-50 border border-slate-200 rounded-lg px-2 py-2 font-black text-blue-600" value="${d.price_sell}">` },
                    { "data": "status_api", "render": d => {
                        let color = d === 'available' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600';
                        return `<span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${color}">${d}</span>`;
                    }},
                    { "data": null, "render": d => `<div class="form-check form-switch"><input class="form-check-input scale-125" type="checkbox" id="s-${d._id}" ${d.is_active?'checked':''} onchange="updateRow('${d._id}')"></div>` },
                    { "data": null, "render": d => `<button class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all" onclick="updateRow('${d._id}')"><i class="fas fa-save"></i></button>` }
                ]
            });
        });

        // (Fungsi syncData & updateRow tetap sama)
        async function syncData() {
            const profit = $('#profitInput').val();
            const btn = $('#btnSync').attr('disabled', true).text('Wait...');
            const res = await fetch('/api/admin/sync-services', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ profit }) });
            const data = await res.json();
            Swal.fire({ icon: data.status ? 'success' : 'error', title: data.message, timer: 2000, showConfirmButton: false });
            $('#tableServices').DataTable().ajax.reload();
            btn.attr('disabled', false).html('<i class="fas fa-sync mr-1"></i> SYNCR ATL');
        }

        async function updateRow(id) {
            const price_sell = $(`#p-${id}`).val();
            const is_active = $(`#s-${id}`).is(':checked');
            await fetch(`/api/admin/services/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ price_sell, is_active }) });
            const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 1000 });
            Toast.fire({ icon: 'success', title: 'Tersimpan' });
        }
    </script>
</body>
</html>
